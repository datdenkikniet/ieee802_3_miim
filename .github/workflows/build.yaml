name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  check-format:
    runs-on: ubuntu-latest
    name: Format
    steps:
      - uses: actions/checkout@v5
      - name: Run cargo fmt
        run: cargo fmt --check

  check-and-test:
    runs-on: ubuntu-latest
    name: Check and test
    strategy:
      matrix:
        command:
          - "--no-default-features"
          - "--no-default-features --features defmt"
          - "--features lan8720a"
          - "--features lan8742a"
          - "--features ksz8081r"
          - "--all-features"
    steps:
      - uses: actions/checkout@v5
      - name: Run cargo check
        run: CARGO_BUILD_WARNINGS=deny cargo check --keep-going --locked
      - name: Run cargo test
        run: cargo test --locked

  clippy:
    runs-on: ubuntu-latest
    name: Clippy
    steps:
      - uses: actions/checkout@v5
      - name: Run cargo check
        run: CARGO_BUILD_WARNINGS=deny cargo clippy --keep-going --locked

  docs:
    runs-on: ubuntu-latest
    name: Docs
    steps:
      - uses: actions/checkout@v5
      - name: Run cargo check
        run: CARGO_BUILD_WARNINGS=deny cargo doc --no-deps --keep-going --locked

  ci-success:
    runs-on: ubuntu-latest
    needs: [check-format, check-and-test, docs]
    steps:
      - run: true