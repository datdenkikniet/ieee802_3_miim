name: Format, check, test
on:
  pull_request:
  push:
    branches: [main]

jobs:
  check-format:
    runs-on: ubuntu-latest
    name: Format
    steps:
      - uses: actions/checkout@v5
      - name: Run cargo fmt
        run: cargo fmt --check

  check:
    runs-on: ubuntu-latest
    name: Check
    steps:
      - uses: actions/checkout@v5
      - name: Run cargo check
        run: CARGO_BUILD_WARNINGS=deny cargo check --keep-going --locked

  clippy:
    runs-on: ubuntu-latest
    name: Clippy
    steps:
      - uses: actions/checkout@v5
      - name: Run cargo check
        run: CARGO_BUILD_WARNINGS=deny cargo clippy --keep-going --locked

  test:
    runs-on: ubuntu-latest
    name: Test
    steps:
      - uses: actions/checkout@v5
      - name: Run cargo test
        run: cargo test --locked

  ci-success:
    runs-on: ubuntu-latest
    needs: [check-format, check, test]
    steps:
      - run: true